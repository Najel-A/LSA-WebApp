# Cloud-friendly stack: images build deps inside Docker (npm ci) — no local npm install required.
# Optional: copy compose.env.example -> .env and adjust, or export variables in your shell / CI.
#
# Local (default): Mongo in Compose, backend uses mongodb://mongo:27017/...
# Cloud: set MONGODB_URI (e.g. Atlas), run without publishing DB ports, and set CORS_ORIGIN / FRONTEND_URL.
#
# Build & run (no host node_modules needed):
#   docker compose build --no-cache
#   docker compose up -d
#
# Push to a registry (after setting IMAGE_*):
#   docker compose build
#   docker compose push
#
# Analyzer: real NexusTrace FastAPI (`fastapi/`). SPA posts to /query → nginx → analyzer:8000/query.
# Optional Ollama on the host: set RCA_QWEN_URL=http://host.docker.internal:11434 (see compose.env.example).

name: lsa-webapp

services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    # In cloud, prefer a managed DB and omit this service or do not publish ports.
    ports:
      - "${MONGO_BIND:-127.0.0.1:27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-lsa-webapp-backend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      # Default: in-network Mongo. Override for Atlas / managed Mongo in cloud.
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/lsa-webapp}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      # Browser origin hitting the frontend (nginx). Override in cloud, e.g. https://app.example.com
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      ALERT_INGEST_API_KEY: ${ALERT_INGEST_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${BACKEND_BIND:-0.0.0.0:3000}:3000"
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:3000/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  analyzer:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    image: ${ANALYZER_IMAGE:-lsa-webapp-analyzer}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      MODEL_TIMEOUT_S: ${MODEL_TIMEOUT_S:-180}
      RCA_QWEN_URL: ${RCA_QWEN_URL:-}
      RCA_QWEN_MODEL: ${RCA_QWEN_MODEL:-}
      RCA_DEEPSEEK_URL: ${RCA_DEEPSEEK_URL:-}
      RCA_DEEPSEEK_MODEL: ${RCA_DEEPSEEK_MODEL:-}
      EXECUTOR_URL: ${EXECUTOR_URL:-}
      EXECUTOR_MODEL: ${EXECUTOR_MODEL:-}
      VALIDATOR_URL: ${VALIDATOR_URL:-}
      VALIDATOR_MODEL: ${VALIDATOR_MODEL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${ANALYZER_BIND:-127.0.0.1:8000}:8000"
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 8s
      retries: 6
      start_period: 30s

  # Optional: run the LoRA model servers as containers.
  #
  # These images expose POST /v1/rca/generate (not /v1/chat/completions) and
  # require a mounted LoRA adapter directory containing adapter_config.json.
  # Our FastAPI `model_client.py` auto-falls-back to /v1/rca/generate when
  # /v1/chat/completions is missing.
  #
  # Enable with:
  #   docker compose --profile models up -d
  #
  # Then set in your .env (see compose.env.example):
  #   RCA_QWEN_URL=http://rca-qwen:8000
  #   RCA_DEEPSEEK_URL=http://rca-deepseek:8000
  #   EXECUTOR_URL=http://executor-mistral:8000
  #   VALIDATOR_URL=http://validator-llama:8000
  rca-qwen:
    image: deveshs18/rca-lora-qwen:latest
    platform: linux/amd64
    profiles: ["models"]
    restart: unless-stopped
    environment:
      MODEL_PROFILE: qwen
      ADAPTER_PATH: /adapters
      PORT: "8000"
    volumes:
      - ./fastapi/adapters/qwen:/adapters:ro
    networks:
      - app

  rca-deepseek:
    image: deveshs18/rca-lora-deepseek:latest
    platform: linux/amd64
    profiles: ["models"]
    restart: unless-stopped
    environment:
      MODEL_PROFILE: deepseek
      ADAPTER_PATH: /adapters
      PORT: "8000"
    volumes:
      - ./fastapi/adapters/deepseek:/adapters:ro
    networks:
      - app

  executor-mistral:
    image: mrunalikatta/executor-mistral-24b:latest
    platform: linux/amd64
    profiles: ["models"]
    restart: unless-stopped
    environment:
      MODEL_PROFILE: mistral
      ADAPTER_PATH: /adapters
      PORT: "8000"
    volumes:
      - ./fastapi/adapters/executor-mistral:/adapters:ro
    networks:
      - app

  validator-llama:
    image: mrunalikatta/validator-llama-3b:latest
    platform: linux/amd64
    profiles: ["models"]
    restart: unless-stopped
    environment:
      MODEL_PROFILE: llama
      ADAPTER_PATH: /adapters
      PORT: "8000"
    volumes:
      - ./fastapi/adapters/validator-llama:/adapters:ro
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_NEXUSTRACE_ANALYZE_URL: ${VITE_NEXUSTRACE_ANALYZE_URL:-/query}
        VITE_NEXUSTRACE_ANALYZE_TIMEOUT_MS: ${VITE_NEXUSTRACE_ANALYZE_TIMEOUT_MS:-600000}
    image: ${FRONTEND_IMAGE:-lsa-webapp-frontend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      analyzer:
        condition: service_healthy
    ports:
      - "${FRONTEND_BIND:-0.0.0.0:8080}:80"
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mongo_data:
