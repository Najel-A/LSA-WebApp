# Cloud-friendly stack: images build deps inside Docker (npm ci) — no local npm install required.
# Optional: copy compose.env.example -> .env and adjust, or export variables in your shell / CI.
#
# Local (default): Mongo in Compose, backend uses mongodb://mongo:27017/...
# Cloud: set MONGODB_URI (e.g. Atlas), run without publishing DB ports, and set CORS_ORIGIN / FRONTEND_URL.
#
# Build & run (no host node_modules needed):
#   docker compose build --no-cache
#   docker compose up -d
#
# Push to a registry (after setting IMAGE_*):
#   docker compose build
#   docker compose push

name: lsa-webapp

services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    # In cloud, prefer a managed DB and omit this service or do not publish ports.
    ports:
      - "${MONGO_BIND:-127.0.0.1:27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-lsa-webapp-backend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      # Default: in-network Mongo. Override for Atlas / managed Mongo in cloud.
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/lsa-webapp}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      # Browser origin hitting the frontend (nginx). Override in cloud, e.g. https://app.example.com
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      ALERT_INGEST_API_KEY: ${ALERT_INGEST_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${BACKEND_BIND:-0.0.0.0:3000}:3000"
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:3000/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  analyzer:
    image: python:3.11-slim
    restart: unless-stopped
    command:
      [
        "python",
        "-c",
        "from http.server import BaseHTTPRequestHandler,HTTPServer; import json; \nclass H(BaseHTTPRequestHandler):\n  def do_POST(self):\n    self.send_response(200); self.send_header('Content-Type','application/json'); self.end_headers();\n    self.wfile.write(json.dumps({'text':'Diagnosis\\nStub analyzer running.\\n\\nStep-by-Step Fix Plan\\nStart your real FastAPI analyzer on port 8000.\\n\\nConcrete Actions or Commands to Apply the Fix\\n- Replace this container with your analyzer.\\n\\nVerification Steps to Confirm the Fix Worked\\n- Confirm /query returns model output.\\n\\nRollback Guidance if the Fix Causes Issues\\n- Revert the change.'}).encode());\n\nHTTPServer(('0.0.0.0',8000),H).serve_forever()",
      ]
    ports:
      - "${ANALYZER_BIND:-127.0.0.1:8000}:8000"
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_NEXUSTRACE_ANALYZE_URL: ${VITE_NEXUSTRACE_ANALYZE_URL:-/query}
        VITE_NEXUSTRACE_ANALYZE_TIMEOUT_MS: ${VITE_NEXUSTRACE_ANALYZE_TIMEOUT_MS:-600000}
    image: ${FRONTEND_IMAGE:-lsa-webapp-frontend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      analyzer:
        condition: service_started
    ports:
      - "${FRONTEND_BIND:-0.0.0.0:8080}:80"
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mongo_data:
