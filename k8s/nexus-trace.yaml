---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-trace-validator-llama
  namespace: nexus-trace
  labels:
    app.kubernetes.io/name: nexus-trace-validator-llama
    app.kubernetes.io/component: model
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexus-trace-validator-llama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexus-trace-validator-llama
        app.kubernetes.io/component: model
    spec:
      tolerations:
        - key: "gpu-node"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      containers:
        - name: validator-llama
          image: mrunalikatta/validator-llama-3b:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: MODEL_PROFILE
              value: "llama"
            - name: ADAPTER_PATH
              value: "/adapters"
            - name: PORT
              value: "8000"
          volumeMounts:
            - name: adapters
              mountPath: /adapters
              subPath: validator-llama
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
              # nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "12Gi"
              # nvidia.com/gpu: "1"
      volumes:
        - name: adapters
          persistentVolumeClaim:
            claimName: nexus-trace-model-adapters

---
apiVersion: v1
kind: Service
metadata:
  name: validator-llama
  namespace: nexus-trace
  labels:
    app.kubernetes.io/name: nexus-trace-validator-llama
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nexus-trace-validator-llama
  ports:
    - name: http
      port: 8000
      targetPort: http

---
# -----------------------------------------------------------------------------
# Frontend (nginx + static React) — external LoadBalancer
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-trace-frontend
  namespace: nexus-trace
  labels:
    app.kubernetes.io/name: nexus-trace-frontend
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexus-trace-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexus-trace-frontend
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: frontend
          image: frostal027/lsa-frontend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: nexus-trace
  labels:
    app.kubernetes.io/name: nexus-trace-frontend
    app.kubernetes.io/component: web
spec:
  selector:
    app.kubernetes.io/name: nexus-trace-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
  # Minikube: run `minikube tunnel` in another terminal so LoadBalancer gets an IP.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-2b
  namespace: nexus-trace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-2b
  template:
    metadata:
      labels:
        app: ollama-2b
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - name: http
              containerPort: 11434
          resources:
            limits:
              cpu: "2"
              memory: "8Gi"
            requests:
              cpu: "1"
              memory: "4Gi"
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    ollama serve &
                    sleep 10
                    ollama pull gemma:2b
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-2b
  namespace: nexus-trace
spec:
  selector:
    app: ollama-2b
  ports:
    - name: http
      port: 11434
      targetPort: 11434
  type: ClusterIP