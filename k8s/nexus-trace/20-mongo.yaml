apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-trace-mongo-data
  namespace: nexus-trace
  labels:
    app.kubernetes.io/name: nexus-trace-mongo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-trace-mongo
  namespace: nexus-trace
  labels:
    app.kubernetes.io/name: nexus-trace-mongo
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexus-trace-mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexus-trace-mongo
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: mongo
          image: mongo:6
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb
              containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nexus-trace-mongo-data

---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: nexus-trace
  labels:
    app.kubernetes.io/name: nexus-trace-mongo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nexus-trace-mongo
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb

